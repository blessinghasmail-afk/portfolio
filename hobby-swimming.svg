  <path d="M182 145 Q200 135 218 145 Q230 155 240 150 L255 148" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M182 145 Q170 155 160 150 L145 148" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Bubbles -->
