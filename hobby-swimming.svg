      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <!-- Waves -->
  <path d="M0 160 Q50 140 100 160 Q150 180 200 160 Q250 140 300 160 Q350 180 400 160 L400 260 L0 260 Z" fill="url(#wave)"/>
  <path d="M0 180 Q60 160 120 180 Q180 200 240 180 Q300 160 360 180 Q390 190 400 185 L400 260 L0 260 Z" fill="rgba(14,165,233,0.5)"/>
  <!-- Swimmer silhouette -->
