<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="320" cy="60" r="35" fill="rgba(255,255,255,0.2)"/>
  <circle cx="320" cy="60" r="22" fill="rgba(255,255,255,0.35)"/>
  <!-- Ground -->
  <rect x="0" y="200" width="400" height="60" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="196" width="400" height="8" fill="rgba(0,0,0,0.2)"/>
  <!-- Road dashes -->
  <rect x="40" y="218" width="40" height="5" fill="rgba(255,255,255,0.3)" rx="2"/>
  <rect x="120" y="218" width="40" height="5" fill="rgba(255,255,255,0.3)" rx="2"/>
  <rect x="200" y="218" width="40" height="5" fill="rgba(255,255,255,0.3)" rx="2"/>
  <rect x="280" y="218" width="40" height="5" fill="rgba(255,255,255,0.3)" rx="2"/>
  <!-- Runner silhouette -->
  <circle cx="185" cy="130" r="16" fill="rgba(0,0,0,0.6)"/>
  <line x1="185" y1="146" x2="185" y2="185" stroke="rgba(0,0,0,0.6)" stroke-width="5" stroke-linecap="round"/>
  <line x1="185" y1="185" x2="165" y2="200" stroke="rgba(0,0,0,0.6)" stroke-width="5" stroke-linecap="round"/>
  <line x1="185" y1="185" x2="205" y2="197" stroke="rgba(0,0,0,0.6)" stroke-width="5" stroke-linecap="round"/>
  <line x1="185" y1="158" x2="165" y2="148" stroke="rgba(0,0,0,0.6)" stroke-width="4" stroke-linecap="round"/>
  <line x1="185" y1="158" x2="207" y2="170" stroke="rgba(0,0,0,0.6)" stroke-width="4" stroke-linecap="round"/>
  <!-- Motion lines -->
  <line x1="100" y1="148" x2="150" y2="148" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="158" x2="155" y2="158" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="168" x2="158" y2="168" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <text x="200" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="rgba(255,255,255,0.9)" font-weight="bold">Running</text>
</svg>
