      <stop offset="0%" style="stop-color:#1e1b18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#292524;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#1e1b18;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="400" height="260" fill="url(#warm)"/>
  <rect width="400" height="260" fill="url(#lamp)"/>
